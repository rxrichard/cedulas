<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coleção Numismático Richard Bastos - Acervo Digital</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header id="main-header">
    <h1 id="site-title">GALERIA DE MOEDAS E CÉDULAS</h1>
    
    <div class="burger-btn" onclick="toggleMenu()">☰</div>
    
    <div class="header-subtitle">COLEÇÃO NUMISMÁTICA - RICHARD BASTOS</div>
    
    <div class="nav-menu" id="navMenu">

        <!-- LINHA 1: Toggle Cédulas/Moedas + Botões BR/Estrangeiras -->
        <div class="nav-row-main">

            <!-- Toggle Cédulas / Moedas -->
            <div class="type-toggle-wrap">
                <span class="toggle-label active" id="toggle-label-cedulas">Cédulas</span>
                <div class="type-toggle" id="typeToggle" onclick="toggleAba()" title="Alternar tipo">
                    <div class="toggle-thumb"></div>
                </div>
                <span class="toggle-label" id="toggle-label-moedas">Moedas</span>
            </div>

            <!-- Separador vertical -->
            <div class="nav-divider"></div>

            <!-- Botões Nacionais / Estrangeiras -->
            <div class="pais-btns">
                <button class="pais-btn active" id="btn-br" onclick="mudarPais('BR')">🇧🇷 Nacionais</button>
                <button class="pais-btn" id="btn-estrang" onclick="mudarPais('ESTRANG')">🌍 Estrangeiras</button>
            </div>
        </div>

        <!-- LINHA 2: Filtros de status + Filtro de país + Busca -->
        <div class="filters-container">
            <button class="filter-btn active" id="filter-todos"  onclick="mudarFiltro('TODOS')">Todas as Peças</button>
            <button class="filter-btn"        id="filter-troca"  onclick="mudarFiltro('TROCA')">Para Troca</button>
            <button class="filter-btn"        id="filter-acervo" onclick="mudarFiltro('ACERVO')">Acervo Pessoal</button>

            <!-- Dropdown de país — só visível em modo Estrangeiras -->
            <div class="pais-filter-wrap" id="paisFilterWrap" style="display:none;">
                <select class="pais-select" id="paisSelect" onchange="mudarPaisFilter(this.value)">
                    <option value="TODOS">🌍 Todos os Países</option>
                </select>
            </div>

            <!-- Botão Buscar — mesmo estilo dos filter-btn -->
            <button class="filter-btn filter-btn-search" onclick="toggleBusca()" title="Buscar peça">🔍 Buscar</button>
        </div>
    </div>
</header>

<div class="container" id="main-container"></div>

<div class="modal" id="modalInterativo">
    <div class="modal-content">
        <button class="close-modal" onclick="fecharTudo()" title="Fechar (ESC)">&times;</button>
        
        <div class="modal-header-info">
            <h2 id="infoTitle">Nome do Item</h2>
            <div class="badges">
                <span class="badge" id="modalStatusBadge"></span>
                <span class="badge">Valor Facial:<b id="specValor"></b></span>
                <span class="badge">Série/Ano:<b id="specSerial"></b></span>
            </div>
        </div>

        <div class="flipper-container">
            <button class="nav-btn prev-btn" id="btnPrev" onclick="navegar(-1)" title="Item Anterior">&#10094;</button>
            <button class="nav-btn next-btn" id="btnNext" onclick="navegar(1)" title="Próximo Item">&#10095;</button>

            <div class="card-flipper" id="flipper">
                <div class="note-face face-front">
                    <img id="imgFront" src="" onclick="abrirSuperZoom(this.src)" title="Clique para ampliar">
                </div>
                <div class="note-face face-back">
                    <img id="imgBack" src="" onclick="abrirSuperZoom(this.src)" title="Clique para ampliar">
                </div>
            </div>

            <div class="modal-controls">
                <div class="control-btn" onclick="toggleFlip()" title="Girar Item">
                    <svg viewBox="0 0 24 24"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg>
                </div>
            </div>
        </div>

        <div class="zoom-hint">🔍 Clique na imagem para abrir o SUPER ZOOM</div>

        <div class="info-panel">
            <p id="infoDesc"></p>
            <div class="curiosity-tag">💡 <span id="infoCuriosity"></span></div>
            
            <div id="wa-btn-container" class="wa-btn-wrapper">
                <a id="wa-btn" href="#" target="_blank" class="wa-button">
                    💬 Tenho interesse nesta troca!
                </a>
            </div>
        </div>
    </div>
</div>

<div id="superZoom">
    <button class="close-modal" onclick="fecharModal('superZoom')">&times;</button>
    <div id="zoomWrapper">
        <img id="zoomImg" src="" onmousemove="atualizarPosicaoZoom(event)" onwheel="controlarScrollZoom(event)">
    </div>
    <div class="zoom-instructions">
        Scroll do Mouse: Zoom (1x - 4x) • Mover o Mouse: Navegar
    </div>
</div>

<!-- ===== PAINEL DE BUSCA ===== -->
<div id="searchOverlay" class="search-overlay">
    <div class="search-panel">
        <div class="search-input-wrap">
            <span class="search-icon-input">🔍</span>
            <input type="text" id="searchInput" class="search-input"
                   placeholder="Buscar por valor, moeda, série, país..."
                   oninput="executarBusca(this.value)"
                   autocomplete="off" spellcheck="false">
            <button class="search-clear" id="searchClear" onclick="limparBusca()">✕</button>
        </div>
        <div class="search-results" id="searchResults"></div>
    </div>
    <div class="search-backdrop" onclick="fecharBusca()"></div>
</div>

<script src="image-list-br.js"></script>
<script src="image-list-estrang.js"></script>
<script src="descricoes-notas.js"></script>
<script src="script.js"></script>

</body>
</html>
